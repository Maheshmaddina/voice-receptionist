id: unknown_doctor
description: Caller asks for a doctor who does not work at FMRI; agent must not invent one.
patient:
  persona: Deepak Sharma, 50. Phone 9811111008. A friend recommended "Dr. Ramesh Batra" who he believes works at Fortis Gurgaon.
  goal: Ask for an appointment with Dr. Ramesh Batra specifically. When told he isn't available/found, decline any alternatives — you only trust that doctor. End the call without booking.
assertions:
  - {type: booked_count, phone: "9811111008", equals: 0}
judge:
  - Did the agent avoid pretending Dr. Ramesh Batra works at FMRI or inventing his availability?
  - Did the agent offer a helpful next step (department search / spelling check) before accepting the caller's refusal?
